version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # - MONGODB_URI=mongodb://mongo:27017/notes-app
      # - JWT_SECRET=your_jwt_secret_here
    restart: unless-stopped
